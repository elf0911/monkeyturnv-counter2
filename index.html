<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>モンキーターンV カウンター</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">スマスロ</p>
      <h1>モンキーターンV カウンター</h1>
    </div>
    <button id="resetAllBtn" class="ghost danger" type="button">全リセット</button>
  </header>

  <main class="app-shell">
    <section class="card judgment-card">
      <button class="card-toggle" type="button" data-target="judgmentBody">
        <span>📊 設定判別</span><span class="chevron">▼</span>
      </button>
      <div id="judgmentBody" class="collapsible">
        <div id="oddsBars" class="odds-bars"></div>

        <hr />
        <div class="confirm-box">
          <h2>⚠ 確定</h2>
          <div id="confirmList" class="confirm-list muted">確定・否定なし</div>
        </div>

        <hr />
        <div class="button-row">
          <button id="useAllBtn" type="button">すべて使用</button>
          <button id="clearAllBtn" type="button">すべて解除</button>
        </div>
        <label class="checkline"><input id="impactToggle" type="checkbox" checked /> 影響度表示</label>

        <hr />
        <div id="judgeItems" class="judge-items"></div>
      </div>
    </section>

    <section id="counterCards" class="counter-grid"></section>
  </main>

  <template id="counterTemplate">
    <section class="card counter-card">
      <button class="card-toggle" type="button">
        <span class="card-title"></span><span class="chevron">▼</span>
      </button>
      <div class="collapsible"></div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
