<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>モンキーターン V</title>
  <meta name="theme-color" content="#f7f7f8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="モンキーターン V">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="app">
  <section id="home" class="screen active">
    <header><h1>モンキーターン V</h1><button id="settingsBtn" class="icon">⚙︎</button></header>
    <main>
      <div id="homeList" class="list"></div>
      <div class="list nav"><button id="judgeBtn" class="navrow"><span>設定判別</span><span>›</span></button></div>
      <p class="ver">clean-v2</p>
    </main>
  </section>

  <section id="settings" class="screen">
    <header class="three"><button class="back" data-to="home">戻る</button><h1>設定</h1><span></span></header>
    <main>
      <div class="label">表示項目</div>
      <div id="settingList" class="list"></div>
      <div class="label">ゲーム数ボタン</div>
      <div class="list">
        <label class="setrow"><span>＋ボタン</span><select id="plusStep"></select></label>
        <label class="setrow"><span>－ボタン</span><select id="minusStep"></select></label>
      </div>
      <div class="label">データ管理</div>
      <div class="list"><div class="setrow"><span>実戦データをリセット</span><button id="resetBtn" class="danger">リセット</button></div></div>
      <p class="note">表示を外してもデータは残ります。リセット時のみ初期化します。</p>
    </main>
  </section>

  <section id="judge" class="screen">
    <header class="three"><button class="back" data-to="home">戻る</button><h1>設定判別</h1><span></span></header>
    <main>
      <div class="list">
        <div class="judgeBlock"><div class="blockTitle">設定期待度</div><div id="bars"></div></div>
        <div id="signals" class="signals"></div>
        <div class="tools">
          <div class="toolBtns"><button id="useAll">すべて使用</button><button id="useNone">すべて解除</button></div>
          <label class="setrow compact"><span>影響度表示</span><input id="impactToggle" type="checkbox"></label>
        </div>
        <div id="judgeItems"></div>
      </div>
      <p class="ver">clean-v2</p>
    </main>
  </section>
</div>
<script src="./app.js"></script>
</body>
</html>
